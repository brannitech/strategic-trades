<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Trades - Family Trade Ideas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.db = null;
        window.auth = null;

        window.initFirebase = (config) => {
            try {
                const app = initializeApp(config);
                window.db = getFirestore(app);
                window.auth = getAuth(app);
                return true;
            } catch (e) {
                return false;
            }
        };
    </script>
</head>
<body class="bg-[#0b0f19] text-gray-100 min-h-screen flex flex-col">

    <!-- LOCK SCREEN -->
    <div id="lock-screen" class="fixed inset-0 bg-[#0b0f19]/98 backdrop-blur-md z-50 flex flex-col justify-center items-center px-4">
        <div class="bg-[#111827] border border-gray-800 p-8 rounded-2xl w-full max-w-md text-center">
            <h2 class="text-2xl font-bold text-white mb-6">Brannon Trades v3.5</h2>
            <input type="password" id="gate-passcode" placeholder="Enter Passcode" class="w-full bg-[#1c2333] border border-gray-700 rounded-xl px-4 py-3 mb-4">
            <button onclick="attemptUnlock()" class="w-full py-3 bg-emerald-500 font-bold rounded-xl">Unlock</button>
        </div>
    </div>

    <!-- SIGN-IN MODAL -->
    <div id="google-signin-modal" class="fixed inset-0 bg-black/80 z-[60] hidden flex justify-center items-center p-4">
        <div class="bg-[#111827] border border-gray-800 p-8 rounded-2xl w-full max-w-sm text-center">
            <h3 class="text-lg font-bold text-white mb-4">Google Sign-In</h3>
            <input type="email" id="google-email-input" placeholder="family-member@gmail.com" class="w-full bg-[#1c2333] border border-gray-700 p-3 rounded-xl mb-4">
            <button onclick="submitGoogleAuth()" class="w-full py-3 bg-white text-gray-900 font-bold rounded-xl">Continue</button>
        </div>
    </div>

    <!-- APP HEADER -->
    <header class="bg-[#111827] border-b border-gray-800 px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-extrabold text-white">Brannon Trades v3.5</h1>
        <button onclick="openConfigModal()" class="bg-[#1c2333] border border-gray-700 px-4 py-2 rounded-xl text-xs font-bold hover:text-white">Settings</button>
    </header>

    <main class="flex-grow p-4">
        <div class="bg-[#111827] border border-gray-800 rounded-2xl p-6 min-h-[400px]">
            <textarea id="notes-textarea" class="w-full h-32 bg-[#0b0f19] border border-gray-800 p-4 rounded-xl text-sm" placeholder="Write notes..."></textarea>
            <button onclick="triggerCloudPublish()" class="mt-4 px-6 py-3 bg-emerald-500 text-gray-950 font-bold rounded-xl">Publish Analysis</button>
        </div>
    </main>

    <!-- SETTINGS MODAL -->
    <div id="config-modal" class="fixed inset-0 bg-black/60 z-[60] hidden flex justify-center items-center p-4">
        <div class="bg-[#111827] border border-gray-800 p-8 rounded-2xl w-full max-w-lg">
            <h3 class="text-lg font-bold mb-4 text-white">System Settings</h3>
            <textarea id="firebase-config-input" class="w-full h-32 bg-[#0b0f19] border border-gray-800 p-3 text-xs font-mono text-emerald-400 mb-4" placeholder="Paste Firebase config here..."></textarea>
            <button onclick="applyConfiguration()" class="w-full py-3 bg-emerald-500 text-gray-950 font-bold rounded-xl">Save & Initialize</button>
        </div>
    </div>

    <script>
        // Data structure to store stocks
        window.tickerDatabase = JSON.parse(localStorage.getItem('brannon_ticker_db')) || {};

        function triggerCloudPublish() {
            if (!window.db) { showToast("Error", "Configure Firebase first.", "error"); return; }
            signInAnonymously(window.auth).then(userCred => {
                setDoc(doc(window.db, 'artifacts', 'brannon-trades', 'users', userCred.user.uid, 'data', 'playbook'), {
                    data: window.tickerDatabase,
                    updated: new Date().toISOString()
                }).then(() => showToast("Success", "Synced to cloud!"));
            });
        }

        function applyConfiguration() {
            const configInput = document.getElementById('firebase-config-input').value;
            localStorage.setItem('brannon_firebase_config', configInput);
            if (window.initFirebase(JSON.parse(configInput))) {
                document.getElementById('config-modal').classList.add('hidden');
            }
        }

        function attemptUnlock() { document.getElementById('lock-screen').classList.add('hidden'); }
        function attemptGoogleAuth() { document.getElementById('google-signin-modal').classList.remove('hidden'); }
        function submitGoogleAuth() { document.getElementById('lock-screen').classList.add('hidden'); document.getElementById('google-signin-modal').classList.add('hidden'); }
        function openConfigModal() { document.getElementById('config-modal').classList.remove('hidden'); }

        window.onload = () => {
            // Restore saved notes to the textarea
            const savedNotes = tickerDatabase['default_notes'] || '';
            document.getElementById('notes-textarea').value = savedNotes;

            const savedConfig = localStorage.getItem('brannon_firebase_config');
            if (savedConfig) window.initFirebase(JSON.parse(savedConfig));
        };

        function showToast(title, body) { /* UI Toast Helper */ }
    </script>
</body>
</html>
