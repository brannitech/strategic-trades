<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brannon Trades v3.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBV8H3mEkEVEgB41NIxLQFYzBcenz-1crM",
            authDomain: "brannon-family-trades.firebaseapp.com",
            projectId: "brannon-family-trades",
            storageBucket: "brannon-family-trades.firebasestorage.app",
            messagingSenderId: "348812690999",
            appId: "1:348812690999:web:51f0f085cf678f67d5a1b2"
        };

        window.app = null;
        window.db = null;
        window.auth = null;
        window.userId = null;
        const appId = 'brannon-trades-app';

        async function initFirebase() {
            try {
                window.app = initializeApp(firebaseConfig);
                window.db = getFirestore(window.app);
                window.auth = getAuth(window.app);

                await signInAnonymously(window.auth);
                onAuthStateChanged(window.auth, (user) => {
                    if (user) {
                        window.userId = user.uid;
                        document.getElementById('sync-status').className = "text-[9px] text-emerald-500 font-bold uppercase";
                        document.getElementById('sync-status').innerText = "Live Sync Active";
                        setupSync();
                    }
                });
            } catch(e) { console.error("Firebase init failed", e); }
        }

        function setupSync() {
            const noteRef = doc(window.db, 'artifacts', appId, 'users', window.userId, 'notes', 'playbook');
            onSnapshot(noteRef, (doc) => {
                if (doc.exists()) {
                    document.getElementById('notes').value = doc.data().content || "";
                }
            }, (err) => console.error("Sync error:", err));

            document.getElementById('notes').addEventListener('input', async (e) => {
                await setDoc(noteRef, { content: e.target.value }, { merge: true });
            });
        }
        window.initFirebase = initFirebase;
    </script>
    <style>body { font-family: 'Inter', sans-serif; background-color: #0b0f19; }</style>
</head>
<body class="text-gray-100 min-h-screen">

    <!-- LOGIN GATEWAY -->
    <div id="lock-screen" class="fixed inset-0 bg-[#0b0f19] z-[100] flex flex-col justify-center items-center p-4">
        <div class="bg-[#111827] p-8 rounded-2xl border border-gray-800 w-full max-w-sm shadow-2xl relative">
            <h1 class="text-2xl font-bold text-white mb-6">Brannon Trades <span class="text-emerald-500 text-xs">v3.2</span></h1>
            <input type="password" id="gate-passcode" placeholder="Family Passcode" class="w-full bg-[#0b0f19] p-3 rounded-xl mb-4 border border-gray-700 focus:border-emerald-500 outline-none text-white">
            <button onclick="attemptUnlock()" class="w-full py-3 bg-emerald-500 text-black font-bold rounded-xl mb-4">Access Portal</button>
            <button onclick="attemptGoogleAuth()" class="w-full py-3 bg-[#1c2333] border border-gray-700 text-gray-300 rounded-xl hover:bg-gray-800 transition-all text-sm font-medium">Sign in with Google</button>
        </div>
    </div>

    <!-- GOOGLE LOGIN MODAL -->
    <div id="google-signin-modal" class="fixed inset-0 bg-black/80 z-[105] hidden flex justify-center items-center p-4">
        <div class="bg-[#111827] p-8 rounded-2xl border border-gray-800 w-full max-w-sm">
            <h3 class="font-bold text-white mb-4">Sign in with Google</h3>
            <input type="email" id="google-email-input" placeholder="email@gmail.com" class="w-full bg-[#0b0f19] p-3 rounded-xl mb-4 border border-gray-700 text-white">
            <div class="flex gap-2">
                <button onclick="closeGoogleSignInModal()" class="flex-1 py-2 bg-gray-800 text-white rounded-xl">Cancel</button>
                <button onclick="submitGoogleAuth()" class="flex-1 py-2 bg-white text-black font-bold rounded-xl">Continue</button>
            </div>
        </div>
    </div>

    <!-- MAIN PORTAL -->
    <header class="bg-[#111827] border-b border-gray-800 px-6 py-4 flex justify-between items-center">
        <h1 class="font-bold">Brannon Trades <span class="text-xs text-gray-500 ml-2">v3.2</span></h1>
        <div id="sync-status" class="text-[9px] text-gray-500 font-bold uppercase">Sync Offline</div>
    </header>

    <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-2 bg-[#111827] p-6 rounded-2xl border border-gray-800 min-h-[400px]">
            <h2 class="font-bold mb-4">Market Workspace</h2>
            <div id="workspace" class="text-gray-500 italic text-sm">Dashboard connecting to Live Feed...</div>
        </div>
        <div class="bg-[#111827] p-6 rounded-2xl border border-gray-800">
            <h3 class="font-bold mb-4">Playbook</h3>
            <textarea id="notes" class="w-full h-64 bg-[#0b0f19] p-4 rounded-xl border border-gray-800 text-sm focus:border-emerald-500 outline-none" placeholder="Syncing..."></textarea>
        </div>
    </div>

    <script>
        const WHITELIST = ['peter.brannon@gmail.com', 'joellen77@gmail.com', 'matthewjohnbrannon@gmail.com'];

        function grantAccess() {
            document.getElementById('lock-screen').classList.add('hidden');
            document.getElementById('google-signin-modal').classList.add('hidden');
            initFirebase(); 
            fetchTwelveData();
        }

        function attemptUnlock() {
            if(document.getElementById('gate-passcode').value === 'SmithFamilyCode') grantAccess();
            else alert("Incorrect passcode.");
        }

        function attemptGoogleAuth() {
            document.getElementById('google-signin-modal').classList.remove('hidden');
        }

        function closeGoogleSignInModal() {
            document.getElementById('google-signin-modal').classList.add('hidden');
        }

        function submitGoogleAuth() {
            const email = document.getElementById('google-email-input').value.toLowerCase();
            if(WHITELIST.includes(email)) grantAccess();
            else alert("Email not whitelisted.");
        }

        async function fetchTwelveData() {
            const apiKey = localStorage.getItem('twelve');
            if(!apiKey) return;
            try {
                const response = await fetch(`https://api.twelvedata.com/price?symbol=AAPL,MSFT,QQQ&apikey=${apiKey}`);
                const data = await response.json();
                let html = '<div class="grid grid-cols-1 md:grid-cols-3 gap-4">';
                for(const [symbol, info] of Object.entries(data)) {
                    html += `<div class="bg-[#0b0f19] p-4 rounded-xl border border-gray-700">
                                <div class="text-[9px] text-gray-500 uppercase">${symbol}</div>
                                <div class="text-xl font-bold">$${parseFloat(info.price).toFixed(2)}</div>
                             </div>`;
                }
                document.getElementById('workspace').innerHTML = html + '</div>';
            } catch(e) { console.error(e); }
        }
    </script>
</body>
</html>
