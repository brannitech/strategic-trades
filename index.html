<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Trades - Family Trade Ideas</title>
    <!-- STREAMING_CHUNK:Loading foundational assets and styles... -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- STREAMING_CHUNK:Initializing Firebase SDK modules... -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.db = null;
        window.auth = null;

        window.initFirebase = (config) => {
            try {
                const app = initializeApp(config);
                window.db = getFirestore(app);
                window.auth = getAuth(app);
                return true;
            } catch (e) {
                console.error("Firebase Init Failed:", e);
                return false;
            }
        };
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col overflow-x-hidden">

    <!-- SECURE LOCK SCREEN GATEWAY -->
    <!-- STREAMING_CHUNK:Rendering UI layers and components... -->
    <div id="lock-screen" class="fixed inset-0 bg-[#0b0f19]/98 backdrop-blur-md z-50 flex flex-col justify-center items-center px-4 transition-all duration-300">
        <div class="bg-[#111827] border border-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md text-center">
            <div class="flex justify-center items-center space-x-3 mb-6">
                <div class="w-12 h-12 rounded-xl bg-emerald-500/10 border border-emerald-500/30 flex items-center justify-center shadow-[0_0_15px_rgba(16,185,129,0.2)]">
                    <svg class="w-7 h-7 text-emerald-400" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2V22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M8 6H16V18H8V6Z" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                        <path d="M17 10V14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M7 8V16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="text-left">
                    <span class="text-2xl font-bold tracking-tight text-white block">Brannon Trades v3.5</span>
                    <span class="text-xs text-emerald-400 font-semibold uppercase tracking-wider">Strategic Node</span>
                </div>
            </div>
            <h2 class="text-lg font-medium text-gray-300 mb-6">Enter Passcode to Access Family Node</h2>
            <div class="space-y-4">
                <div class="relative">
                    <input type="password" id="gate-passcode" placeholder="Enter Family Passcode" 
                           class="w-full bg-[#1c2333] border border-gray-700 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 rounded-xl px-4 py-3 pl-11 text-white placeholder-gray-500 focus:outline-none transition-all">
                    <i class="fa-solid fa-lock absolute left-4 top-4 text-gray-500"></i>
                </div>
                <button onclick="attemptUnlock()" class="w-full py-3 bg-emerald-500 hover:bg-emerald-600 active:scale-[0.98] text-gray-950 font-bold rounded-xl transition-all shadow-[0_4px_20px_rgba(16,185,129,0.3)]">
                    Unlock Portal
                </button>
            </div>
            <div class="relative flex py-5 items-center">
                <div class="flex-grow border-t border-gray-800"></div>
                <span class="flex-shrink mx-4 text-gray-500 text-xs uppercase tracking-widest font-semibold">or authenticate</span>
                <div class="flex-grow border-t border-gray-800"></div>
            </div>
            <button onclick="attemptGoogleAuth()" class="w-full py-3 bg-[#1c2333] hover:bg-[#252f44] border border-gray-700 hover:border-gray-600 rounded-xl flex items-center justify-center space-x-3 text-sm font-medium transition-all active:scale-[0.98]">
                <i class="fa-brands fa-google text-red-400 text-base"></i>
                <span>Sign in with Google Account</span>
            </button>
        </div>
    </div>

    <!-- MAIN APP STRUCTURE -->
    <header class="bg-[#111827] border-b border-gray-800 px-6 py-4 flex justify-between items-center z-10">
        <h1 class="text-xl font-extrabold text-white">Brannon Trades v3.5</h1>
        <button onclick="openConfigModal()" class="bg-[#1c2333] border border-gray-700 px-4 py-2 rounded-xl text-xs font-bold hover:text-white">Settings</button>
    </header>

    <main class="flex-grow p-4">
        <div class="bg-[#111827] border border-gray-800 rounded-2xl p-6 min-h-[400px]">
            <textarea id="notes-textarea" class="w-full h-32 bg-[#0b0f19] border border-gray-800 p-4 rounded-xl text-sm" placeholder="Write notes..."></textarea>
            <button onclick="triggerCloudPublish()" class="mt-4 px-6 py-3 bg-emerald-500 text-gray-950 font-bold rounded-xl">Publish Analysis</button>
        </div>
    </main>

    <!-- CONFIG MODAL -->
    <div id="config-modal" class="fixed inset-0 bg-black/60 z-[60] hidden flex justify-center items-center p-4">
        <div class="bg-[#111827] border border-gray-800 p-8 rounded-2xl w-full max-w-lg">
            <h3 class="text-lg font-bold mb-4 text-white">System Settings</h3>
            <textarea id="firebase-config-input" class="w-full h-32 bg-[#0b0f19] border border-gray-800 p-3 text-xs font-mono text-emerald-400 mb-4" placeholder="Paste Firebase config here..."></textarea>
            <button onclick="applyConfiguration()" class="w-full py-3 bg-emerald-500 text-gray-950 font-bold rounded-xl">Save & Initialize</button>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 space-y-2 z-[100]"></div>

    <!-- STREAMING_CHUNK:Configuring the Firebase sync engine... -->
    <script>
        function showToast(title, body, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = "flex items-start gap-3 bg-[#111827] border border-gray-800 p-4 rounded-xl shadow-2xl w-80";
            toast.innerHTML = `<h4 class="text-xs font-bold text-white">${title}</h4><p class="text-[10px] text-gray-400">${body}</p>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function triggerCloudPublish() {
            if (!window.db) {
                showToast("Connection Required", "Please configure Firebase in Settings.", "error");
                return;
            }
            showToast("Publishing...", "Syncing to cloud...", "info");
            try {
                const user = (await signInAnonymously(window.auth)).user;
                await setDoc(doc(window.db, 'artifacts', 'brannon-trades', 'users', user.uid, 'data', 'playbook'), {
                    notes: document.getElementById('notes-textarea').value,
                    updated: new Date().toISOString()
                });
                showToast("Nodes Synced", "Cloud data updated successfully!", "success");
            } catch (e) {
                showToast("Sync Error", e.message, "error");
            }
        }

        function applyConfiguration() {
            const configInput = document.getElementById('firebase-config-input').value;
            localStorage.setItem('brannon_firebase_config', configInput);
            try {
                const config = JSON.parse(configInput);
                if (window.initFirebase(config)) {
                    document.getElementById('config-modal').classList.add('hidden');
                    showToast("Config Saved", "Firebase initialized.", "success");
                }
            } catch (e) {
                showToast("Error", "Invalid JSON Config", "error");
            }
        }

        function attemptUnlock() { document.getElementById('lock-screen').classList.add('hidden'); }
        function attemptGoogleAuth() { document.getElementById('google-signin-modal').classList.remove('hidden'); }
        function openConfigModal() { document.getElementById('config-modal').classList.remove('hidden'); }

        window.onload = () => {
            const savedConfig = localStorage.getItem('brannon_firebase_config');
            if (savedConfig) {
                try {
                    window.initFirebase(JSON.parse(savedConfig));
                } catch(e) {}
            }
        };
    </script>
</body>
</html>
